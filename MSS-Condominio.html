<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<title>Gestión Administrativa - Martínez Services SpA</title>
<style>
/* Estilos base para una interfaz amplia */
body{background:#04080F; color:#F0FDF4; font-family:sans-serif; padding:20px;}
.container{max-width:1200px; margin:auto;}
.grid-torres{display:grid; grid-template-columns:repeat(auto-fit, minmax(250px, 1fr)); gap:20px;}
.card{background:#0D1826; padding:20px; border-radius:8px; border:1px solid rgba(16,185,129,0.2);}
input, button{padding:10px; margin:5px 0; width:100%; border-radius:4px; border:1px solid #10B981; background:#04080F; color:white;}
button{background:#10B981; cursor:pointer; font-weight:bold;}
</style>
</head>
<body>
<div class="container">
    <h1>Administración: Martínez Services SpA</h1>
    <p>Panel de control para gestión de 8 torres.</p>
    
    <div class="card">
        <h3>Agregar Nueva Torre</h3>
        <input type="text" id="nombreTorre" placeholder="Ej: Torre 1, Torre 2...">
        <button onclick="agregarTorre()">Crear Torre</button>
    </div>

    <div id="listaTorres" class="grid-torres" style="margin-top:20px;">
        <!-- Aquí aparecerán tus 8 torres -->
    </div>
</div>

<script>
function agregarTorre() {
    const nombre = document.getElementById('nombreTorre').value;
    if(!nombre) return;
    
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `
        <h4>${nombre}</h4>
        <p>Unidades: [Ingresa los departamentos aquí]</p>
        <p>Estado: [Pendiente de carga de datos]</p>
        <button onclick="this.parentElement.remove()">Eliminar</button>
    `;
    document.getElementById('listaTorres').appendChild(div);
    document.getElementById('nombreTorre').value = '';
}
</script>
</body>
</html>
