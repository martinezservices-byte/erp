<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Administración - Martínez Services SpA</title>
    <style>
        body { background: #04080F; color: #F0FDF4; font-family: sans-serif; display: flex; margin: 0; }
        /* Menú Lateral */
        .sidebar { width: 260px; background: #08101C; height: 100vh; padding: 20px; border-right: 1px solid #10B981; }
        .sidebar h2 { font-size: 18px; margin-bottom: 5px; }
        .sidebar p { font-size: 12px; color: #10B981; margin-bottom: 20px; }
        .menu { list-style: none; padding: 0; }
        .menu li { padding: 10px 0; cursor: pointer; color: #A0A0A0; }
        .menu li:hover { color: #F0FDF4; }
        
        /* Contenido Principal */
        .main { flex-grow: 1; padding: 40px; }
        .card { background: #08101C; padding: 30px; border-radius: 8px; border: 1px solid #10B981; }
        input { background: #04080F; border: 1px solid #10B981; color: white; padding: 10px; width: 250px; }
        button { background: #10B981; color: #04080F; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        .grid-torres { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Martínez Services SpA</h2>
    <p>Administradora: Gaudy Martínez</p>
    <ul class="menu">
        <li>Dashboard</li>
        <li>Gestión de Unidades</li>
        <li>Gastos Comunes</li>
        <li>Egresos</li>
        <li>Fondo de Reserva</li>
        <li>Novedades</li>
        <li>Configuración</li>
    </ul>
</div>

<div class="main">
    <div class="card">
        <h1>Gestión de Torres</h1>
        <p>Panel para administrar tus 8 torres.</p>
        <input type="text" id="nombreTorre" placeholder="Nombre de la Torre...">
        <button onclick="agregarTorre()">Agregar Torre</button>
    </div>

    <div id="listaTorres" class="grid-torres">
        <!-- Tus torres aparecerán aquí -->
    </div>
</div>

<script>
    function agregarTorre() {
        const nombre = document.getElementById('nombreTorre').value;
        if(!nombre) return;
        const div = document.createElement('div');
        div.className = 'card';
        div.style.padding = "15px";
        div.innerHTML = `<h3>${nombre}</h3><p>Datos por ingresar...</p><button onclick="this.parentElement.remove()" style="background:#EF4444; color:white;">Eliminar</button>`;
        document.getElementById('listaTorres').appendChild(div);
        document.getElementById('nombreTorre').value = '';
    }
</script>
</body>
</html>
