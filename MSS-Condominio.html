<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Administración - Martínez Services SpA</title>
    <style>
        /* Diseño original restaurado */
        body { background: #04080F; color: #F0FDF4; font-family: sans-serif; }
        .sidebar { width: 250px; background: #08101C; height: 100vh; position: fixed; padding: 20px; }
        .main-content { margin-left: 270px; padding: 20px; }
        .card { background: #0D1826; padding: 20px; border-radius: 8px; border: 1px solid rgba(16,185,129,0.2); margin-bottom: 20px; }
        button { background: #10B981; color: #04080F; border: none; padding: 10px; border-radius: 4px; cursor: pointer; }
        .grid-torres { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h3>Martínez Services SpA</h3>
    <p>Administradora: Gaudy Martínez</p>
    <hr>
    <ul>
        <li>Dashboard</li>
        <li>Gestión de Unidades</li>
        <li>Gastos Comunes</li>
        <li>Egresos</li>
        <li>Fondo de Reserva</li>
        <li>Novedades</li>
        <li>Configuración</li>
    </ul>
</div>

<div class="main-content">
    <div class="card">
        <h1>Gestión de Torres</h1>
        <p>Panel para administrar tus 8 torres.</p>
        <input type="text" id="nombreTorre" placeholder="Nombre de la Torre (ej: Torre A)">
        <button onclick="agregarTorre()">Agregar Torre</button>
    </div>

    <div id="listaTorres" class="grid-torres">
        <!-- Aquí se mostrarán tus torres dinámicamente -->
    </div>
</div>

<script>
    function agregarTorre() {
        const nombre = document.getElementById('nombreTorre').value;
        if(!nombre) return;
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `<h4>${nombre}</h4><p>Sin datos cargados.</p><button onclick="this.parentElement.remove()">Eliminar</button>`;
        document.getElementById('listaTorres').appendChild(div);
        document.getElementById('nombreTorre').value = '';
    }
</script>
</body>
</html>
