<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>MSS ERP — Gestión de Usuarios</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0A0F1C;color:#F9FAFB;font-family:'Segoe UI',system-ui,sans-serif;padding:20px;}
.hdr{display:flex;align-items:center;gap:12px;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,0.08);}
.hdr-logo{width:40px;height:40px;background:linear-gradient(135deg,#C9A84C,#F59E0B);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#0A0F1C;font-size:18px;}
.hdr-title{font-size:18px;font-weight:800;}
.hdr-sub{font-size:11px;color:#6B7280;}
.btn-back{margin-left:auto;padding:8px 16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:#9CA3AF;font-size:12px;cursor:pointer;text-decoration:none;}
.card{background:#111827;border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:20px;margin-bottom:16px;}
.card-title{font-size:12px;font-weight:700;color:#C9A84C;text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.fg label{font-size:11px;color:#9CA3AF;font-weight:600;text-transform:uppercase;}
.fi{background:#1F2937;border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:10px 12px;color:#F9FAFB;font-size:13px;width:100%;outline:none;font-family:inherit;}
.fi:focus{border-color:#C9A84C;}
.btn{padding:10px 20px;border-radius:8px;border:none;font-weight:700;cursor:pointer;font-size:13px;font-family:inherit;}
.btn-gold{background:linear-gradient(135deg,#C9A84C,#F59E0B);color:#0A0F1C;}
.btn-danger{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#EF4444;}
.btn-outline{background:none;border:1px solid rgba(255,255,255,0.1);color:#9CA3AF;}
.user-row{display:flex;align-items:center;gap:12px;padding:12px;background:#1F2937;border-radius:10px;margin-bottom:8px;}
.user-avatar{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,#C9A84C,#F59E0B);display:flex;align-items:center;justify-content:center;font-weight:900;color:#0A0F1C;font-size:14px;flex-shrink:0;}
.user-info{flex:1;}
.user-name{font-size:13px;font-weight:700;}
.user-email{font-size:11px;color:#6B7280;}
.user-role{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700;}
.role-admin{background:rgba(201,168,76,0.2);color:#C9A84C;}
.role-user{background:rgba(56,189,248,0.15);color:#38BDF8;}
.msg{padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:12px;display:none;}
.msg.ok{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);color:#10B981;}
.msg.err{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#EF4444;}
.msg.show{display:block;}
select.fi{appearance:none;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:600px){.grid2{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-logo">M</div>
  <div>
    <div class="hdr-title">Gestión de Usuarios</div>
    <div class="hdr-sub">Administra accesos al ERP</div>
  </div>
  <a href="index.html" class="btn-back">← Volver al ERP</a>
</div>

<!-- CREAR USUARIO -->
<div class="card">
  <div class="card-title">➕ Crear Nuevo Usuario</div>
  <div id="msgCrear" class="msg"></div>
  <div class="grid2">
    <div class="fg">
      <label>Nombre completo</label>
      <input class="fi" id="newNombre" type="text" placeholder="Ej: Ana González"/>
    </div>
    <div class="fg">
      <label>Correo electrónico</label>
      <input class="fi" id="newEmail" type="email" placeholder="ana@ejemplo.com"/>
    </div>
  </div>
  <div class="grid2">
    <div class="fg">
      <label>Contraseña temporal</label>
      <input class="fi" id="newPass" type="password" placeholder="Mínimo 6 caracteres"/>
    </div>
    <div class="fg">
      <label>Rol</label>
      <select class="fi" id="newRol">
        <option value="admin">👑 Administrador — acceso total</option>
        <option value="user">👤 Usuario — acceso estándar</option>
        <option value="condo">🏢 Solo Condominio</option>
        <option value="terreno">📍 Solo Terreno/App móvil</option>
      </select>
    </div>
  </div>
  <button class="btn btn-gold" onclick="crearUsuario()">➕ Crear Usuario</button>
</div>

<!-- LISTA USUARIOS -->
<div class="card">
  <div class="card-title">👥 Usuarios Activos</div>
  <div id="listaUsuarios">
    <div style="color:#6B7280;font-size:12px;padding:10px 0">Cargando usuarios...</div>
  </div>
</div>

<!-- CAMBIAR CONTRASEÑA PROPIA -->
<div class="card">
  <div class="card-title">🔑 Cambiar Mi Contraseña</div>
  <div id="msgPass" class="msg"></div>
  <div class="grid2">
    <div class="fg">
      <label>Nueva contraseña</label>
      <input class="fi" id="newPassPropia" type="password" placeholder="Mínimo 6 caracteres"/>
    </div>
    <div class="fg">
      <label>Confirmar contraseña</label>
      <input class="fi" id="newPassConfirm" type="password" placeholder="Repite la contraseña"/>
    </div>
  </div>
  <button class="btn btn-gold" onclick="cambiarPass()">🔑 Actualizar Contraseña</button>
</div>

<script type="module">
import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged, updatePassword, createUserWithEmailAndPassword, updateProfile }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, setDoc, getDocs, collection, deleteDoc, getDoc }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const FB = {apiKey:"AIzaSyDH517EzBb4MColYbIzfPW215kl3H6hUjI",authDomain:"mss-erp.firebaseapp.com",projectId:"mss-erp",storageBucket:"mss-erp.firebasestorage.app",messagingSenderId:"546891085564",appId:"1:546891085564:web:82a24fb40941e6a54a0979"};
const app  = getApps().length?getApps()[0]:initializeApp(FB);
const auth = getAuth(app);
const db   = getFirestore(app);

let _user = null;

// Verificar sesión
onAuthStateChanged(auth, async u => {
  if(!u){ window.location.href='MSS-Login.html'; return; }
  _user = u;
  // Verificar si es admin
  const snap = await getDoc(doc(db,'usuarios/'+u.uid));
  if(!snap.exists()){
    // Primera vez: crear documento admin automáticamente
    await setDoc(doc(db,'usuarios/'+u.uid),{
      uid: u.uid,
      nombre: u.displayName || u.email.split('@')[0],
      email: u.email,
      rol: 'admin',
      creado: new Date().toISOString()
    });
    cargarUsuarios();
    return;
  }
  const rolActual = snap.data().rol;
  if(rolActual !== 'admin'){
    alert('Solo administradores pueden gestionar usuarios.\nTu rol actual es: ' + rolActual + '\nContacta al administrador del sistema.');
    window.location.href='index.html'; return;
  }
  cargarUsuarios();
});

async function cargarUsuarios(){
  const snap = await getDocs(collection(db,'usuarios'));
  const lista = document.getElementById('listaUsuarios');
  if(snap.empty){ lista.innerHTML='<div style="color:#6B7280;font-size:12px">Sin usuarios registrados aún</div>'; return; }
  const roles = {admin:'👑 Admin',user:'👤 Usuario',condo:'🏢 Condominio',terreno:'📍 Terreno'};
  lista.innerHTML = '';
  snap.forEach(d=>{
    const u = d.data();
    const div = document.createElement('div');
    div.className = 'user-row';
    div.innerHTML = `
      <div class="user-avatar">${(u.nombre||u.email||'?')[0].toUpperCase()}</div>
      <div class="user-info">
        <div class="user-name">${u.nombre||'—'}</div>
        <div class="user-email">${u.email}</div>
      </div>
      <span class="user-role ${u.rol==='admin'?'role-admin':'role-user'}">${roles[u.rol]||u.rol}</span>
      ${u.uid!==_user.uid?`<button class="btn btn-danger" style="padding:5px 10px;font-size:11px" onclick="eliminarUsuario('${d.id}','${u.email}')">✕</button>`:'<span style="font-size:10px;color:#6B7280">Tú</span>'}`;
    lista.appendChild(div);
  });
}

window.crearUsuario = async function(){
  const nombre = document.getElementById('newNombre').value.trim();
  const email  = document.getElementById('newEmail').value.trim();
  const pass   = document.getElementById('newPass').value;
  const rol    = document.getElementById('newRol').value;
  const msg    = document.getElementById('msgCrear');
  msg.className='msg';

  if(!nombre||!email||!pass){ msg.textContent='Completa todos los campos.'; msg.className='msg err show'; return; }
  if(pass.length<6){ msg.textContent='La contraseña debe tener al menos 6 caracteres.'; msg.className='msg err show'; return; }

  try{
    // Crear en Firebase Auth — usa la API Admin vía función secundaria
    // Como estamos en cliente, creamos el usuario y lo guardamos en Firestore
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    await updateProfile(cred.user, {displayName: nombre});
    await setDoc(doc(db,'usuarios/'+cred.user.uid),{
      uid:cred.user.uid, nombre, email, rol,
      creadoPor:_user.email, creado:new Date().toISOString()
    });
    // Nota: al crear vía cliente, Firebase hace login automático — volvemos a loguear al admin
    msg.textContent='✓ Usuario '+nombre+' creado correctamente. La contraseña temporal es: '+pass;
    msg.className='msg ok show';
    document.getElementById('newNombre').value='';
    document.getElementById('newEmail').value='';
    document.getElementById('newPass').value='';
    cargarUsuarios();
  }catch(e){
    const msgs={'auth/email-already-in-use':'Este correo ya está registrado.','auth/invalid-email':'Correo no válido.'};
    msg.textContent = msgs[e.code]||'Error: '+e.message;
    msg.className='msg err show';
  }
};

window.eliminarUsuario = async function(uid, email){
  if(!confirm('¿Eliminar acceso de '+email+'?\nEl usuario no podrá volver a ingresar al ERP.'))return;
  try{
    await deleteDoc(doc(db,'usuarios/'+uid));
    cargarUsuarios();
  }catch(e){ alert('Error: '+e.message); }
};

window.cambiarPass = async function(){
  const p1  = document.getElementById('newPassPropia').value;
  const p2  = document.getElementById('newPassConfirm').value;
  const msg = document.getElementById('msgPass');
  msg.className='msg';
  if(!p1||!p2){ msg.textContent='Completa ambos campos.'; msg.className='msg err show'; return; }
  if(p1!==p2) { msg.textContent='Las contraseñas no coinciden.'; msg.className='msg err show'; return; }
  if(p1.length<6){ msg.textContent='Mínimo 6 caracteres.'; msg.className='msg err show'; return; }
  try{
    await updatePassword(_user, p1);
    msg.textContent='✓ Contraseña actualizada correctamente.';
    msg.className='msg ok show';
    document.getElementById('newPassPropia').value='';
    document.getElementById('newPassConfirm').value='';
  }catch(e){
    msg.textContent = e.code==='auth/requires-recent-login'?'Por seguridad, cierra sesión y vuelve a ingresar antes de cambiar la contraseña.':'Error: '+e.message;
    msg.className='msg err show';
  }
};
</script>
</body>
</html>
