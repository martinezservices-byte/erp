<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Mi Panel — Martinez Services ERP</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#04080F;--surf:#08101C;--surf2:#0D1929;--surf3:#111f33;
  --brd:rgba(255,255,255,0.06);--brd2:rgba(255,255,255,0.04);
  --txt:#E2E8F0;--muted:#475569;--mutedHi:#64748B;
  --body:'Segoe UI',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
}
body{background:var(--bg);color:var(--txt);font-family:var(--body);min-height:100vh;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

/* TOPBAR */
#topbar{background:var(--surf);border-bottom:1px solid var(--brd);padding:0 24px;height:56px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;}
#tbLogo{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0;}
.tb-nm{font-size:13px;font-weight:700;}
.tb-sub{font-size:10px;color:var(--mutedHi);}
.tb-r{margin-left:auto;display:flex;align-items:center;gap:10px;}
#tbEmail{font-size:10px;color:var(--mutedHi);font-family:var(--mono);}
#tbDemo{font-size:10px;padding:3px 10px;border-radius:20px;display:none;font-family:var(--mono);}
.btn-salir{padding:5px 13px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#FCA5A5;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;font-family:var(--mono);}

/* LOADING */
#loading{display:flex;align-items:center;justify-content:center;min-height:80vh;flex-direction:column;gap:12px;}
.spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,0.06);border-top-color:#10B981;border-radius:50%;animation:spin .8s linear infinite;}

/* MAIN */
#main{display:none;max-width:960px;margin:0 auto;padding:28px 20px 60px;}
.g-date{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#10B981;font-family:var(--mono);margin-bottom:5px;}
.g-title{font-size:24px;font-weight:700;margin-bottom:2px;}
.g-title span{color:#10B981;}
.g-sub{font-size:12px;color:var(--mutedHi);margin-bottom:24px;}

/* EMPRESA CARD */
.emp-card{background:var(--surf);border-radius:14px;overflow:hidden;border:1px solid var(--brd);margin-bottom:0;}
.emp-top{height:2px;}
.emp-head{display:flex;align-items:flex-start;gap:14px;padding:18px 20px 14px;}
.emp-av{width:52px;height:52px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;flex-shrink:0;overflow:hidden;}
.emp-av img{width:100%;height:100%;object-fit:contain;}
.emp-nm{font-size:16px;font-weight:700;margin-bottom:2px;}
.emp-meta{font-size:10px;color:var(--mutedHi);font-family:var(--mono);}
.badges{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;}
.badge{padding:2px 9px;border-radius:20px;font-size:9px;font-weight:700;font-family:var(--mono);}

/* ÁREAS LABEL */
.areas-lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--mutedHi);font-family:var(--mono);padding:0 20px 12px;}

/* LISTA DE ÁREAS */
.areas-list{border-top:1px solid var(--brd2);}

/* ÁREA ROW */
.area-row{border-bottom:1px solid var(--brd2);overflow:hidden;}
.area-row:last-child{border-bottom:none;}

/* ÁREA HEADER (clickable) */
.area-hdr{display:flex;align-items:center;gap:14px;padding:14px 20px;cursor:pointer;transition:background .15s;user-select:none;}
.area-hdr:hover{background:var(--surf2);}
.area-hdr.active{background:var(--surf2);}
.area-color-bar{width:3px;height:36px;border-radius:2px;flex-shrink:0;}
.area-icon{font-size:20px;flex-shrink:0;width:28px;text-align:center;}
.area-info{flex:1;}
.area-name{font-size:13px;font-weight:700;margin-bottom:2px;}
.area-desc{font-size:10px;color:var(--mutedHi);line-height:1.4;}
.area-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.area-count{font-size:10px;font-family:var(--mono);}
.area-btn{padding:5px 14px;border:none;border-radius:20px;font-size:10px;font-weight:700;cursor:pointer;font-family:var(--mono);}
.area-btn-lock{padding:5px 12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.25);border-radius:20px;font-size:10px;font-weight:700;cursor:pointer;font-family:var(--mono);}
.chevron{font-size:12px;color:var(--mutedHi);transition:transform .2s;}
.chevron.open{transform:rotate(180deg);}

/* SUB-MÓDULOS (desplegable) */
.area-body{display:none;border-top:1px solid var(--brd2);animation:slideDown .2s ease;}
.area-body.open{display:block;}
.mods-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;padding:14px 20px 16px;}
.mod-chip{display:flex;align-items:center;gap:9px;padding:10px 12px;background:var(--surf3);border-radius:9px;border:1px solid var(--brd2);text-decoration:none;transition:all .15s;cursor:pointer;}
.mod-chip:hover{border-color:var(--color);background:var(--bg);}
.mod-chip-icon{font-size:16px;flex-shrink:0;}
.mod-chip-name{font-size:11px;font-weight:600;font-family:var(--mono);color:var(--txt);}
.mod-chip-desc{font-size:9px;color:var(--mutedHi);margin-top:1px;}

/* MODAL ACTIVAR */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;align-items:center;justify-content:center;padding:20px;}
.modal-ov.open{display:flex;}
.modal{background:var(--surf);border-radius:14px;padding:26px;max-width:420px;width:100%;border:1px solid var(--brd);}
.modal h3{font-size:16px;font-weight:700;margin-bottom:8px;}
.modal p{font-size:12px;color:var(--mutedHi);margin-bottom:18px;line-height:1.7;}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:11px;}
.field label{font-size:10px;color:var(--mutedHi);font-weight:700;text-transform:uppercase;letter-spacing:.5px;font-family:var(--mono);}
.field input,.field textarea{background:var(--surf2);border:1px solid var(--brd);border-radius:7px;padding:8px 11px;color:var(--txt);font-family:var(--mono);font-size:12px;outline:none;width:100%;}
.field input:focus,.field textarea:focus{border-color:#10B981;}
.btn-send{width:100%;padding:11px;background:#10B981;color:#04080F;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--mono);margin-bottom:7px;}
.btn-cancel{width:100%;padding:9px;background:transparent;border:1px solid var(--brd);color:var(--mutedHi);border-radius:8px;font-size:12px;cursor:pointer;font-family:var(--mono);}

@media(max-width:600px){
  .mods-grid{grid-template-columns:repeat(2,1fr);}
  #main{padding:20px 14px 40px;}
}
</style>
</head>

<div id="topbar">
  <div id="tbLogo" style="background:#10B981">M</div>
  <div>
    <div class="tb-nm" id="tbNm">Mi Panel</div>
    <div class="tb-sub">Portal Cliente · Martinez Services ERP</div>
  </div>
  <div class="tb-r">
    <span id="tbEmail"></span>

<script>
// Mostrar hub inmediatamente si ya hay datos en caché de sesión
(function(){
  try{
    const cache = sessionStorage.getItem('mss_hub_cache');
    if(cache){
      const d = JSON.parse(cache);
      // Pre-rellenar nombre y empresa para evitar flash
      const gn = document.getElementById('gNombre');
      const en = document.getElementById('empNm');
      if(gn && d.nombre) gn.textContent = d.nombre.split(' ')[0];
      if(en && d.empNombre) en.textContent = d.empNombre;
    }
  }catch(e){}
})();
</script>

// ══════════════════════════════════════════════════════

// Mapa de módulo-id a área-id (para saber si el cliente tiene acceso)
const MOD_A_AREA = {
  condominio:'condominio', app_residentes:'app_residentes',
  rrhh:'rrhh', remuneraciones:'rrhh', contratos:'rrhh', portal_trabajador:'rrhh',
  contabilidad:'contabilidad', finanzas:'contabilidad', tesoreria:'contabilidad',
  facturacion:'facturacion', compras:'facturacion', cotizacion:'facturacion',
  inventario:'gestion', catalogo:'gestion', arriendos:'gestion', ventas:'gestion', proyectos:'gestion',
  auditoria:'auditoria', estrategia:'auditoria',
};

let _condo=null, _mods=[];

onAuthStateChanged(auth, async user=>{
  if(!user){window.location.href='MSS-Login.html';return;}
  const email=user.email||'';
  document.getElementById('tbEmail').textContent=email;
  let clienteId=null, nombre=user.displayName||email.split('@')[0], dias=null;

  try{const p=await getDoc(doc(db,'usuarios/'+user.uid));if(p.exists()){clienteId=p.data().clienteId||null;nombre=p.data().nombre||nombre;}}catch(e){}

  // Buscar cliente por clienteId o email
  try{
    let cd=null;
    if(clienteId){const s1=await getDoc(doc(db,'clientes/'+clienteId));const s2=await getDoc(doc(db,'clientes/'+clienteId.replace('cli_','')));if(s1.exists())cd=s1.data();else if(s2.exists())cd=s2.data();}
    if(!cd){const qs=await getDocs(query(collection(db,'clientes'),where('email','==',email.toLowerCase())));if(!qs.empty){cd=qs.docs[0].data();clienteId=qs.docs[0].id;}}
    if(!cd){const qs=await getDocs(query(collection(db,'clientes'),where('email','==',email.toUpperCase())));if(!qs.empty){cd=qs.docs[0].data();clienteId=qs.docs[0].id;}}
    if(cd){
      _mods=cd.modulos||[];
      if(cd.estado==='demo'){
        const dp=Math.floor((Date.now()-(cd.creado||Date.now()))/86400000);
        dias=(cd.diasDemo||7)-dp;
        if(dias<=0){await signOut(auth);window.location.href='MSS-DemoVencida.html';return;}
        const td=document.getElementById('tbDemo');td.textContent=`Demo · ${dias} día${dias===1?'':'s'}`;td.style.display='block';
      }
      if(clienteId)await setDoc(doc(db,'usuarios/'+user.uid),{clienteId},{merge:true}).catch(()=>{});
    }
  }catch(e){console.warn('Mods:',e.message);}

  localStorage.setItem('mss_es_cliente_externo','true');
  localStorage.setItem('mss_cliente_id',clienteId||('cli_'+user.uid));
  localStorage.setItem('mss_modulos_permitidos',JSON.stringify(_mods));

  // Buscar condominio si tiene ese módulo
  if(_mods.includes('condominio')){
    try{const s=await getDocs(collection(db,'condominios_clientes'));s.forEach(d=>{const c=d.data();if(!_condo&&(c.uid===user.uid||c.clienteId===clienteId))_condo={id:d.id,...c};});}catch(e){}
    if(!_condo){window.location.href='MSS-BienvenidaCliente.html';return;}
    localStorage.setItem('mss_empresa_actual',JSON.stringify(_condo));
    localStorage.setItem('mss_condominio_actual',JSON.stringify(_condo));
  }

  renderHub(nombre, dias);
});

function renderHub(nombre, dias){
  const now=new Date();
  document.getElementById('gDate').textContent=now.toLocaleDateString('es-CL',{weekday:'long',year:'numeric',month:'long',day:'numeric'}).toUpperCase();
  document.getElementById('gNombre').textContent=nombre.split(' ')[0];

  const entidad=_condo||{nombre:'Mi Empresa',rut:'',direccion:''};
  const color=entidad.color||'#10B981';
  document.getElementById('empTop').style.background=`linear-gradient(90deg,${color},${color}55)`;
  document.getElementById('tbLogo').style.background=color;
  document.getElementById('tbLogo').textContent=(entidad.nombre||'M').charAt(0);
  document.getElementById('tbNm').textContent=entidad.nombre||'Mi Panel';
  document.getElementById('empNm').textContent=entidad.nombre||'Mi Empresa';

  const logo=localStorage.getItem('mss_logo_condo_'+entidad.id)||localStorage.getItem('mss_logo_url_'+entidad.id)||null;
  const av=document.getElementById('empAv');
  if(logo){av.innerHTML=`<img src="${logo}" alt="logo"/>`;}
  else{av.textContent=(entidad.nombre||'E').charAt(0);av.style.cssText=`background:${color}18;border:1px solid ${color}30;color:${color};`;}

  if(entidad.rut)document.getElementById('empRut').textContent=entidad.rut;
  if(entidad.direccion)document.getElementById('empDir').textContent='📍 '+entidad.direccion;

  const be=document.getElementById('empBadges');
  be.innerHTML='<span class="badge" style="background:rgba(34,197,94,0.12);color:#22C55E;border:1px solid rgba(34,197,94,0.2)">Activo</span>';
  if(dias!==null)be.innerHTML+=`<span class="badge" style="background:rgba(56,189,248,0.1);color:#38BDF8;border:1px solid rgba(56,189,248,0.2)">Demo · ${dias} días</span>`;

  renderAreas();
  // Guardar caché para retorno rápido
  try{
    sessionStorage.setItem('mss_hub_cache', JSON.stringify({
      nombre: nombre,
      empNombre: (_condo||{}).nombre||''
    }));
  }catch(e){}
  document.getElementById('loading').style.display='none';
  document.getElementById('main').style.display='block';
}

function renderAreas(){
  const modSet=new Set(_mods);
  const list=document.getElementById('areasList');
  // Determinar qué áreas mostrar según módulos del cliente
  const areasActivas=new Set();
  _mods.forEach(m=>{ const a=MOD_A_AREA[m]; if(a)areasActivas.add(a); });

  // Siempre mostrar todas las áreas — activas y bloqueadas
  const ORDEN=['condominio','app_residentes','rrhh','contabilidad','facturacion','gestion','auditoria'];
  // Filtrar: si no tiene condominio, no mostrar condominio ni app_residentes
  const tieneCondominio=modSet.has('condominio');
  const areas=ORDEN.filter(id=>{
    if(!tieneCondominio&&(id==='condominio'||id==='app_residentes'))return false;
    return true;
  });

  list.innerHTML=areas.map(areaId=>{
    const A=AREAS_DEF[areaId];
    const tiene=areasActivas.has(areaId);
    const c=A.color;

    // Chips de sub-módulos
    const modsHtml=A.mods.map(m=>{
      return`<a class="mod-chip" href="${m.href}" style="--color:${c}" onclick="setEmpresaActual()">
        <span class="mod-chip-icon">${m.icon}</span>
        <div><div class="mod-chip-name">${m.nm}</div><div class="mod-chip-desc">${m.desc}</div></div>
      </a>`;
    }).join('');

    return`<div class="area-row" id="row-${areaId}">
      <div class="area-hdr" onclick="toggleArea('${areaId}')">
        <div class="area-color-bar" style="background:${tiene?c:'rgba(255,255,255,0.08)'}"></div>
        <div class="area-icon">${A.icon}</div>
        <div class="area-info">
          <div class="area-name" style="color:${tiene?c:'rgba(255,255,255,0.25)'}">${A.nombre}</div>
          <div class="area-desc">${A.desc}</div>
        </div>
        <div class="area-right">
          ${tiene
            ? `<span class="area-count" style="color:${c}">${A.mods.length} módulos</span>
               <button class="area-btn" style="background:${c};color:#04080F" onclick="event.stopPropagation();toggleArea('${areaId}')">Ver módulos</button>`
            : `<span style="font-size:16px;opacity:.25">🔒</span>
               <button class="area-btn-lock" onclick="event.stopPropagation();solicitarActivacion('${A.nombre}')">Solicitar Activación</button>`
          }
          ${tiene?`<span class="chevron" id="chev-${areaId}">▼</span>`:''}
        </div>
      </div>
      ${tiene?`<div class="area-body" id="body-${areaId}">
        <div class="mods-grid">${modsHtml}</div>
      </div>`:''}
    </div>`;
  }).join('');
}

window.toggleArea=function(areaId){
  const body=document.getElementById('body-'+areaId);
  const chev=document.getElementById('chev-'+areaId);
  const hdr=document.querySelector(`#row-${areaId} .area-hdr`);
  if(!body)return;
  const isOpen=body.classList.contains('open');
  // Cerrar todos primero
  document.querySelectorAll('.area-body').forEach(b=>b.classList.remove('open'));
  document.querySelectorAll('.area-hdr').forEach(h=>h.classList.remove('active'));
  document.querySelectorAll('.chevron').forEach(c=>c.classList.remove('open'));
  // Abrir el seleccionado si estaba cerrado
  if(!isOpen){
    body.classList.add('open');
    hdr.classList.add('active');
    if(chev)chev.classList.add('open');
  }
};

window.setEmpresaActual=function(){
  if(_condo) localStorage.setItem('mss_empresa_actual',JSON.stringify(_condo));
};

window.solicitarActivacion=function(a){
  document.getElementById('modalActDesc').textContent=`Para activar "${a}", completa el formulario y te contactaremos.`;
  document.getElementById('modalAct').classList.add('open');
};

window.enviarSolicitud=async function(){
  const n=document.getElementById('actNm').value.trim(),e=document.getElementById('actEm').value.trim(),m=document.getElementById('actMsg').value.trim();
  if(!n||!e){alert('Completa nombre y email');return;}
  try{await setDoc(doc(db,'solicitudes_activacion/sol_'+Date.now()),{nombre:n,email:e,msg:m,fecha:new Date().toISOString(),clienteId:localStorage.getItem('mss_cliente_id')||''});}catch(ex){}
  document.getElementById('modalAct').classList.remove('open');
  alert('✅ Solicitud enviada. Te contactaremos pronto.');
};

window.cerrarSesion=async function(){
  if(!confirm('¿Cerrar sesión?'))return;
  await signOut(auth);
  ['mss_es_cliente_externo','mss_cliente_id','mss_modulos_permitidos','mss_empresa_actual','mss_condominio_actual'].forEach(k=>localStorage.removeItem(k));
  window.location.href='MSS-Login.html';
};

document.getElementById('modalAct').addEventListener('click',e=>{if(e.target===document.getElementById('modalAct'))document.getElementById('modalAct').classList.remove('open');});
</script>
